<script>
(() => {
  const config = window.__APP_CONFIG__ || {};
  const form = document.getElementById('intakeForm');
  const statusEl = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');
  const clearDraftBtn = document.getElementById('clearDraftBtn');
  const successView = document.getElementById('successView');
  const submitAnotherBtn = document.getElementById('submitAnotherBtn');
  const imageDraftNote = document.getElementById('imageDraftNote');
  const concernImageInput = document.getElementById('specialConcernImages');
  const draftKey = 'bridalIntakeDraft.v1';

  const flashPalette = [
    'rgba(255, 248, 233, 0.42)',
    'rgba(250, 234, 202, 0.4)',
    'rgba(241, 221, 188, 0.35)',
    'rgba(255, 243, 220, 0.36)',
    'rgba(236, 214, 181, 0.28)'
  ];
  const flashLayer = document.createElement('div');
  flashLayer.className = 'ambient-flashes';
  flashLayer.setAttribute('aria-hidden', 'true');
  document.body.insertBefore(flashLayer, document.body.firstChild);

  function getFormRectWithPadding() {
    const rect = form.getBoundingClientRect();
    return {
      left: Math.max(0, rect.left - 24),
      right: Math.min(window.innerWidth, rect.right + 24),
      top: Math.max(0, rect.top - 24),
      bottom: Math.min(window.innerHeight, rect.bottom + 24)
    };
  }

  function pointInsideRect(x, y, rect) {
    return x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom;
  }

  function createAmbientFlash() {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const formRect = getFormRectWithPadding();

    let x = 0;
    let y = 0;
    for (let i = 0; i < 12; i++) {
      x = Math.random() * window.innerWidth;
      y = Math.random() * window.innerHeight;
      if (!pointInsideRect(x, y, formRect)) break;
    }

    if (pointInsideRect(x, y, formRect)) return;

    const flash = document.createElement('span');
    const size = 16 + Math.random() * 54;
    const blur = 0.5 + Math.random() * 1.3;
    const duration = 2200 + Math.random() * 2600;

    flash.className = 'ambient-flash';
    flash.style.left = `${x}px`;
    flash.style.top = `${y}px`;
    flash.style.width = `${size}px`;
    flash.style.height = `${size}px`;
    flash.style.filter = `blur(${blur}px)`;
    flash.style.background = flashPalette[Math.floor(Math.random() * flashPalette.length)];
    flash.style.setProperty('--flash-duration', `${Math.round(duration)}ms`);
    flash.style.setProperty('--flash-opacity', (0.15 + Math.random() * 0.22).toFixed(2));

    flashLayer.appendChild(flash);
    flash.addEventListener('animationend', () => flash.remove(), { once: true });
  }

  function scheduleAmbientFlash() {
    createAmbientFlash();
    const next = 900 + Math.random() * 1700;
    window.setTimeout(scheduleAmbientFlash, next);
  }

  scheduleAmbientFlash();

  const toggles = [
    ['itemsOther', 'itemsOtherTextWrap'],
    ['referralOther', 'referralOtherWrap'],
    ['materialType', 'materialOtherWrap', 'Other'],
    ['colorType', 'colorOtherWrap', 'Other']
  ];

  toggles.forEach(([controlId, wrapId, value]) => {
    const control = document.getElementById(controlId);
    const wrap = document.getElementById(wrapId);
    const sync = () => {
      const on = control.type === 'checkbox' ? control.checked : control.value === value;
      wrap.classList.toggle('hidden', !on);
    };
    control.addEventListener('change', sync);
    sync();
  });

  function normalize(str){return String(str||'').toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();}
  function lev(a,b){const m=a.length,n=b.length,dp=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=0;i<=m;i++)dp[i][0]=i;for(let j=0;j<=n;j++)dp[0][j]=j;for(let i=1;i<=m;i++){for(let j=1;j<=n;j++){const c=a[i-1]===b[j-1]?0:1;dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+c)}}return dp[m][n];}
  function similarity(a,b){if(a===b)return 1;if(!a||!b)return 0;return 1-lev(a,b)/Math.max(a.length,b.length);}

  const designerInput = document.getElementById('designerInput');
  const suggestionsEl = document.getElementById('designerSuggestions');
  let activeIndex = -1;
  let currentSuggestions = [];

  function findSuggestions(term) {
    const typed = normalize(term);
    if (!typed) return [];
    const aliasMap = config.aliasMap || {};
    const designers = config.designers || [];

    const scored = designers.map((name) => ({ name, score: similarity(typed, normalize(name)) }));
    if (aliasMap[typed]) scored.unshift({ name: aliasMap[typed], score: 1 });
    return [...new Map(scored.sort((a,b)=>b.score-a.score).slice(0,7).map((x) => [x.name, x])).values()];
  }

  function renderSuggestions() {
    suggestionsEl.innerHTML = '';
    if (!currentSuggestions.length) {
      suggestionsEl.classList.add('hidden');
      designerInput.setAttribute('aria-expanded', 'false');
      return;
    }
    currentSuggestions.forEach((s, idx) => {
      const li = document.createElement('li');
      li.textContent = `${s.name} (${Math.round(s.score * 100)}%)`;
      li.role = 'option';
      li.classList.toggle('active', idx === activeIndex);
      li.addEventListener('mousedown', (e) => {
        e.preventDefault();
        designerInput.value = s.name;
        closeSuggestions();
      });
      suggestionsEl.appendChild(li);
    });
    suggestionsEl.classList.remove('hidden');
    designerInput.setAttribute('aria-expanded', 'true');
  }

  function closeSuggestions() {
    activeIndex = -1;
    currentSuggestions = [];
    renderSuggestions();
  }

  designerInput.addEventListener('input', () => {
    activeIndex = -1;
    currentSuggestions = findSuggestions(designerInput.value);
    renderSuggestions();
  });

  designerInput.addEventListener('keydown', (e) => {
    if (!currentSuggestions.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIndex = Math.min(currentSuggestions.length - 1, activeIndex + 1);
      renderSuggestions();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIndex = Math.max(0, activeIndex - 1);
      renderSuggestions();
    } else if (e.key === 'Enter' && activeIndex >= 0) {
      e.preventDefault();
      designerInput.value = currentSuggestions[activeIndex].name;
      closeSuggestions();
    } else if (e.key === 'Escape') {
      closeSuggestions();
    }
  });
  designerInput.addEventListener('blur', () => setTimeout(closeSuggestions, 120));

  function collectCheckboxGroup(name) {
    return [...document.querySelectorAll(`[data-name="${name}"] input[type="checkbox"]:checked`)].map((x) => x.value);
  }

  function setStatus(message, type) {
    statusEl.textContent = message;
    statusEl.classList.remove('ok', 'err');
    if (type) statusEl.classList.add(type);
  }


  function showSuccessView(message) {
    form.classList.add('hidden');
    if (successView) {
      successView.classList.remove('hidden');
      const heading = successView.querySelector('h2');
      if (heading && message) heading.textContent = message;
      successView.focus();
      successView.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  function showFormView() {
    if (successView) successView.classList.add('hidden');
    form.classList.remove('hidden');
    form.reset();
    setStatus('', null);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function createDraftSnapshot() {
    const formData = new FormData(form);
    const snapshot = Object.fromEntries(formData.entries());
    snapshot.consentAccepted = formData.get('consentAccepted') === 'on';
    snapshot.itemsIncluded = collectCheckboxGroup('itemsIncluded');
    snapshot.inspectionIssues = collectCheckboxGroup('inspectionIssues');
    snapshot.referralSources = collectCheckboxGroup('referralSources');
    snapshot.serviceRequested = collectCheckboxGroup('serviceRequested');
    delete snapshot.specialConcernImages;
    return snapshot;
  }

  function saveDraft() {
    try {
      localStorage.setItem(draftKey, JSON.stringify({ savedAt: new Date().toISOString(), data: createDraftSnapshot() }));
    } catch (err) {
      // Ignore storage issues to avoid interrupting the form.
    }
  }

  function restoreDraft() {
    try {
      const raw = localStorage.getItem(draftKey);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      const data = parsed && parsed.data ? parsed.data : {};

      Object.entries(data).forEach(([key, value]) => {
        const el = form.elements.namedItem(key);
        if (!el || Array.isArray(value) || typeof value === 'boolean') return;
        el.value = value;
      });

      ['itemsIncluded', 'inspectionIssues', 'referralSources', 'serviceRequested'].forEach((groupName) => {
        const selected = Array.isArray(data[groupName]) ? data[groupName] : [];
        const boxes = document.querySelectorAll(`[data-name="${groupName}"] input[type="checkbox"]`);
        boxes.forEach((box) => {
          box.checked = selected.includes(box.value);
        });
      });

      const consent = form.elements.namedItem('consentAccepted');
      if (consent) consent.checked = Boolean(data.consentAccepted);

      form.dispatchEvent(new Event('change'));
      setStatus('Draft restored from this device.', null);
    } catch (err) {
      // Ignore corrupt drafts.
    }
  }

  function clearDraft() {
    localStorage.removeItem(draftKey);
    setStatus('Saved draft cleared on this device.', null);
  }

  async function fileToPayload(file) {
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ''));
      reader.onerror = () => reject(new Error(`Unable to read ${file.name}`));
      reader.readAsDataURL(file);
    });

    return {
      name: file.name,
      mimeType: file.type || 'application/octet-stream',
      dataBase64: dataUrl.split(',')[1] || ''
    };
  }

  async function collectImagePayloads() {
    const files = concernImageInput && concernImageInput.files ? [...concernImageInput.files] : [];
    if (!files.length) return [];
    if (files.length > 5) throw new Error('Please attach up to 5 images.');
    return Promise.all(files.map(fileToPayload));
  }

  form.addEventListener('input', saveDraft);
  form.addEventListener('change', saveDraft);
  if (clearDraftBtn) clearDraftBtn.addEventListener('click', clearDraft);
  if (submitAnotherBtn) submitAnotherBtn.addEventListener('click', showFormView);
  if (imageDraftNote) imageDraftNote.classList.remove('hidden');

  restoreDraft();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    submitBtn.disabled = true;
    setStatus('Saving intake...', null);

    try {
      const payload = createDraftSnapshot();
      payload.specialConcernImages = await collectImagePayloads();

      google.script.run
        .withSuccessHandler((res) => {
          setStatus(res.message || 'Saved successfully.', 'ok');
          form.reset();
          clearDraft();
          showSuccessView('Your bridal intake has been sent successfully.');
        })
        .withFailureHandler((err) => {
          setStatus(err && err.message ? err.message : 'Unable to submit intake.', 'err');
        })
        .submitIntake(payload);
    } catch (err) {
      setStatus(err && err.message ? err.message : 'Unable to process images.', 'err');
    } finally {
      setTimeout(() => { submitBtn.disabled = false; }, 800);
    }
  });
})();
</script>
