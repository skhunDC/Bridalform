<style>
  :root{--bg:#f5f7fb;--card:#fff;--text:#101526;--muted:#5c6478;--line:#dbe1ee;--accent:#1e3a8a;--ok:#166534;--err:#b91c1c}
  *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(180deg,#eef3ff,#f8fafc);color:var(--text)}
  .app-shell{max-width:980px;margin:auto;padding:1rem}
  .hero{display:flex;gap:1rem;align-items:center;padding:1rem 0}.logo{width:72px;height:auto}
  .hero h1{margin:0;font-size:1.4rem}.hero p{margin:.25rem 0 0;color:var(--muted)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1rem;box-shadow:0 8px 30px rgba(20,30,70,.08)}
  .hidden{display:none!important}
  .form-grid{display:grid;grid-template-columns:1fr;gap:.8rem}
  h2{grid-column:1/-1;margin:.9rem 0 .1rem;font-size:1.03rem}
  label{display:flex;flex-direction:column;gap:.35rem;font-weight:600;font-size:.93rem}
  input,select,textarea,button{font:inherit}
  input,select,textarea{border:1px solid var(--line);border-radius:10px;padding:.62rem .72rem;background:#fff}
  textarea{min-height:90px}
  .checks{display:grid;grid-template-columns:1fr;gap:.5rem;border:1px solid var(--line);border-radius:12px;padding:.8rem}
  .checks label{font-weight:500;display:flex;flex-direction:row;align-items:center;gap:.45rem}
  .full{grid-column:1/-1}.consent{background:#f8fbff;padding:.7rem;border-radius:10px;border:1px solid #c9dafd}
  .actions{display:flex;justify-content:flex-end} button{background:var(--accent);color:#fff;border:0;border-radius:12px;padding:.75rem 1rem;font-weight:700;cursor:pointer}
  button[disabled]{opacity:.6;cursor:not-allowed}.status{min-height:1.25rem;margin:0;color:var(--muted)} .status.ok{color:var(--ok)} .status.err{color:var(--err)}
  .honeypot{position:absolute;left:-9999px;opacity:0;pointer-events:none}
  .designer-wrap{position:relative}.suggestions{position:absolute;z-index:20;left:0;right:0;top:100%;list-style:none;margin:.2rem 0 0;padding:0;background:#fff;border:1px solid var(--line);border-radius:10px;max-height:220px;overflow:auto}
  .suggestions li{padding:.55rem .7rem;cursor:pointer}.suggestions li.active,.suggestions li:hover{background:#eef2ff}
  @media (min-width:720px){.form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.logo{width:92px}}
</style>
