<style>
  :root{--bg:#f5f7fb;--card:#fff;--text:#101526;--muted:#5c6478;--line:#dbe1ee;--accent:#1e3a8a;--ok:#166534;--err:#b91c1c}
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:#f3f4f8;color:var(--text);position:relative}
  body::before{content:"";position:fixed;inset:0;z-index:-2;background:url('https://www.dublincleaners.com/wp-content/uploads/2026/03/BridalformBG.png') center/cover no-repeat;background-attachment:fixed;transform:translateZ(0)}
  body::after{content:"";position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(246,248,255,.7),rgba(248,250,252,.78))}
  .ambient-flashes{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .ambient-flash{position:absolute;border-radius:999px;opacity:0;filter:blur(.4px);animation:flashPulse var(--flash-duration,3200ms) ease-out forwards;mix-blend-mode:screen}
  @keyframes flashPulse{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}22%{opacity:var(--flash-opacity,.34)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.25)}}
  .app-shell{max-width:980px;margin:auto;padding:1rem;position:relative;z-index:2}
  .hero{display:flex;gap:1rem;align-items:center;padding:1rem 0}.logo{width:72px;height:auto}
  .hero h1{margin:0;font-size:1.4rem}.hero p{margin:.25rem 0 0;color:var(--muted)}
  .card{background:rgba(255,255,255,.92);backdrop-filter:blur(1.2px);border:1px solid rgba(219,225,238,.95);border-radius:16px;padding:1rem;box-shadow:0 8px 30px rgba(20,30,70,.12)}
  .hidden{display:none!important}
  .form-grid{display:grid;grid-template-columns:1fr;gap:.8rem}
  h2{grid-column:1/-1;margin:.9rem 0 .1rem;font-size:1.03rem}
  label{display:flex;flex-direction:column;gap:.35rem;font-weight:600;font-size:.93rem}
  input,select,textarea,button{font:inherit}
  input,select,textarea{border:1px solid var(--line);border-radius:10px;padding:.62rem .72rem;background:#fff}
  textarea{min-height:90px}
  .checks{display:grid;grid-template-columns:1fr;gap:.5rem;border:1px solid var(--line);border-radius:12px;padding:.8rem}
  .checks label{font-weight:500;display:flex;flex-direction:row;align-items:center;gap:.45rem}
  .full{grid-column:1/-1}.consent{background:#f8fbff;padding:.7rem;border-radius:10px;border:1px solid #c9dafd}
  .actions{display:flex;justify-content:flex-end;gap:.65rem} button{background:var(--accent);color:#fff;border:0;border-radius:12px;padding:.75rem 1rem;font-weight:700;cursor:pointer} .secondary{background:#e5e7eb;color:#111827}
  button[disabled]{opacity:.6;cursor:not-allowed}.status{min-height:1.25rem;margin:0;color:var(--muted)} .status.ok{color:var(--ok)} .status.err{color:var(--err)} .draft-note{grid-column:1/-1;color:#7c2d12;font-size:.86rem;margin:0}
  .honeypot{position:absolute;left:-9999px;opacity:0;pointer-events:none}
  .designer-wrap{position:relative}.suggestions{position:absolute;z-index:20;left:0;right:0;top:100%;list-style:none;margin:.2rem 0 0;padding:0;background:#fff;border:1px solid var(--line);border-radius:10px;max-height:220px;overflow:auto}
  .suggestions li{padding:.55rem .7rem;cursor:pointer}.suggestions li.active,.suggestions li:hover{background:#eef2ff}

  .confirmation{margin-top:1rem;border:2px solid #166534;background:linear-gradient(180deg,#f0fdf4,#ffffff);text-align:center;padding:1.5rem}
  .confirmation h2{margin:.4rem 0;font-size:1.3rem;color:#14532d}
  .confirmation p{margin:0;color:#1f2937}
  .confirmation-badge{display:inline-flex;align-items:center;gap:.35rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;background:#166534;color:#fff;padding:.35rem .7rem;border-radius:999px;margin:0 auto .5rem}
  @media (hover:none) and (pointer:coarse){
    body::before{background-attachment:scroll;transform:none}
    .card{backdrop-filter:none}
    .ambient-flashes{display:none}
  }
  @supports (-webkit-overflow-scrolling:touch){body::before{background-attachment:scroll}}
  @media (prefers-reduced-motion:reduce){.ambient-flashes{display:none}}
  @media (min-width:720px){.form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.logo{width:92px}}
</style>
